name: Create Member Space

on:
  issue_comment:
    types: [created]

jobs:
  create-space:
    if: |
      contains(github.event.comment.body, '/approve') &&
      github.event.comment.user.login == 'aipmtw' &&
      startsWith(github.event.issue.title, '[申請空間]') &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse and verify signature
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Extract from title: [申請空間] space-name - github-account
          SPACE_NAME=$(echo "$TITLE" | sed 's/\[申請空間\] //' | sed 's/ - .*//')
          GH_ACCOUNT=$(echo "$TITLE" | sed 's/.* - //')

          # Extract Sign from issue body
          BODY_SIGN=$(echo "$ISSUE_BODY" | grep -oP 'Sign：\K[a-f0-9]+' || echo "")

          # Extract space name and account from body to verify consistency
          BODY_SPACE=$(echo "$ISSUE_BODY" | grep -oP '空間名稱：\K\S+' || echo "")
          BODY_ACCOUNT=$(echo "$ISSUE_BODY" | grep -oP 'GitHub：\K\S+' || echo "")

          # Verify title matches body
          if [ "$SPACE_NAME" != "$BODY_SPACE" ] || [ "$GH_ACCOUNT" != "$BODY_ACCOUNT" ]; then
            echo "❌ 標題與內文不一致！標題: $SPACE_NAME/$GH_ACCOUNT, 內文: $BODY_SPACE/$BODY_ACCOUNT"
            gh issue comment ${{ github.event.issue.number }} -R aipmtw/aipmtw.github.io \
              --body "❌ **申請被拒絕**：Issue 標題與內文的空間名稱或帳號不一致，疑似被竄改。請重新透過首頁表單提交申請。"
            exit 1
          fi

          # Verify signature
          SIGN_SALT="aipmtw-2026"
          EXPECTED_SIGN=$(echo -n "${SIGN_SALT}|${SPACE_NAME}|${GH_ACCOUNT}" | sha256sum | cut -c1-16)

          if [ -z "$BODY_SIGN" ]; then
            echo "❌ 缺少簽章！"
            gh issue comment ${{ github.event.issue.number }} -R aipmtw/aipmtw.github.io \
              --body "❌ **申請被拒絕**：Issue 缺少簽章（Sign），請透過首頁表單重新提交申請，不要手動建立 Issue。"
            exit 1
          fi

          if [ "$BODY_SIGN" != "$EXPECTED_SIGN" ]; then
            echo "❌ 簽章不符！expected=$EXPECTED_SIGN, got=$BODY_SIGN"
            gh issue comment ${{ github.event.issue.number }} -R aipmtw/aipmtw.github.io \
              --body "❌ **申請被拒絕**：簽章驗證失敗，Issue 內容可能被修改過。請勿修改表單生成的內容，重新透過首頁表單提交申請。"
            exit 1
          fi

          echo "✅ 簽章驗證通過: $EXPECTED_SIGN"
          echo "space_name=$SPACE_NAME" >> $GITHUB_OUTPUT
          echo "gh_account=$GH_ACCOUNT" >> $GITHUB_OUTPUT

      - name: Create repo from template
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          SPACE="${{ steps.parse.outputs.space_name }}"
          gh repo create "aipmtw/$SPACE" --public --template aipmtw/space-template \
            --description "Member space for ${{ steps.parse.outputs.gh_account }}"
          sleep 5

      - name: Customize template
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          SPACE="${{ steps.parse.outputs.space_name }}"
          INITIAL=$(echo "$SPACE" | head -c 1 | tr '[:lower:]' '[:upper:]')
          git clone "https://x-access-token:${GH_TOKEN}@github.com/aipmtw/$SPACE.git" workspace
          cd workspace
          # Replace SPACE_NAME placeholder with actual name
          find . -type f -not -path './.git/*' -not -path './node_modules/*' | xargs sed -i "s/SPACE_NAME/$SPACE/g"
          # Replace favicon initial letter
          sed -i "s/>S</>$INITIAL</" index.html
          npm install

      - name: Push to repo
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          SPACE="${{ steps.parse.outputs.space_name }}"
          cd workspace
          git config user.name "aipmtw-bot"
          git config user.email "noreply@aipm.com.tw"
          git add -A
          git commit -m "初始建立 $SPACE 個人空間" || echo "No changes to commit"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/aipmtw/$SPACE.git"
          git push origin main --force

      - name: Add collaborator
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          SPACE="${{ steps.parse.outputs.space_name }}"
          ACCOUNT="${{ steps.parse.outputs.gh_account }}"
          gh api "repos/aipmtw/$SPACE/collaborators/$ACCOUNT" -X PUT -f permission=push

      - name: Configure GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          SPACE="${{ steps.parse.outputs.space_name }}"
          # Wait for the first push to be processed
          sleep 5
          gh api "repos/aipmtw/$SPACE/pages" -X POST -f build_type=workflow 2>/dev/null || \
          gh api "repos/aipmtw/$SPACE/pages" -X PUT -f build_type=workflow 2>/dev/null || true

      - name: Close issue with success message
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPACE="${{ steps.parse.outputs.space_name }}"
          ACCOUNT="${{ steps.parse.outputs.gh_account }}"
          gh issue comment ${{ github.event.issue.number }} -R aipmtw/aipmtw.github.io \
            --body "✅ 空間已建立完成！

          - 網站：https://aipm.com.tw/$SPACE/（部署中，約 2 分鐘後可瀏覽）
          - 原始碼：https://github.com/aipmtw/$SPACE
          - 協作者：$ACCOUNT 已加入

          歡迎開始透過 GitHub Issues 提交需求，系統會自動處理！"
          gh issue close ${{ github.event.issue.number }} -R aipmtw/aipmtw.github.io
